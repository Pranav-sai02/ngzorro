

  <div class="ag-theme-alpine ag-grid-responsive" style="height: auto; min-height: 500px;">
    <ag-grid-angular
      [rowData]="users"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [gridOptions]="gridOptions"
      [components]="{
        activeToggleRenderer: ActiveToggleRendererComponent,
        softDeleteRenderer: softDeleteRenderer
      }"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
